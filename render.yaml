services:
  - type: web
    name: hostel-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8081
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ALLOWED_ORIGINS
        sync: false
      # ── Email ──────────────────────────────────────────────────────────────
      # Render's free plan blocks outbound SMTP (ETIMEDOUT on connect), so email
      # is sent via the Brevo HTTP API (port 443). Set BREVO_API_KEY below.
      # EMAIL_FROM must be a sender address verified in your Brevo account.
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
